<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" type="image/png" href="assets/images/logo.png">
	<link rel="stylesheet" href="css/style.css">
</head>

<body>
	<nav class="navbar">
		<div class="container-header">
			<div class="nav-brand">
				<a href="index.html">
					<img src="assets/images/logo.png" alt="IMPrintingOnline Logo" class="nav-logo">
					<span>Inti Media Printing</span>
				</a>
			</div>
			
			<!-- Cart Icon - Pindahkan ke sebelum toggle -->
			<div class="cart-icon" id="cartIcon" style="cursor: pointer;">
				<i class="fas fa-shopping-cart"></i>
				<span class="cart-count">0</span>
			</div>
			
			<!-- Mobile Menu Toggle -->
			<div id="mobileMenuToggle" class="mobile-menu-toggle">
				<span></span>
				<span></span>
				<span></span>
			</div>
			
			<div class="search-section">
				<div class="search-container">
					<input type="text" class="search-input" id="searchInputHome" placeholder="Cari produk.....">
					<button class="search-btn" onclick="searchProducts()">
						<i class="fas fa-search"></i>
					</button>
				</div>
			</div>
			
			<ul class="nav-menu" id="navMenu">
				<li><a href="index.html">Home</a></li>
				<li><a href="products.html">Products</a></li>
				<li><a href="about.html">About Us</a></li>
			</ul>
		</div>
	</nav>

    <div class="container">
        <h1 class="page-title">
            <i class="fas fa-shopping-bag"></i> Checkout
        </h1>
        
        <div class="checkout-container">
			<div class="checkout-card" style="text-align: center;">
				<h3 style="margin-bottom: 15px; color: var(--primary);">
					<i class="fas fa-info-circle"></i> Cara Order
				</h3>
				<p style="color: #666; margin-bottom: 10px;">
					Klik tombol di bawah untuk langsung chat WhatsApp.
				</p>
				<p style="color: #666; font-size: 0.9rem;">
					⏱️ Proses cepat • Respon 5 menit
				</p>
			</div>
            
			<!-- Ringkasan Order -->
			<div class="checkout-card">
				<h3 style="margin-bottom: 20px; color: var(--primary);">
					<i class="fas fa-shopping-cart"></i> Ringkasan Belanja
				</h3>
				
				<div id="cartItems" class="cart-items"></div>
				
				<div class="total-row">
					<span>Total</span>
					<span id="totalHarga">Rp 0</span>
				</div>
				
				<button class="btn-whatsapp" id="whatsappCheckoutBtn" type="button">
					<i class="fab fa-whatsapp"></i>
					CHAT VIA WHATSAPP
				</button>
				
				<p style="font-size: 12px; color: #777; text-align: center; margin-top: 15px">
					<i class="fas fa-bolt"></i> Klik, chat, selesai!
				</p>
			</div>
        </div>
    </div>

    <footer>
        <p>© 2026 Inti Media Printing - All Rights Reserved</p>
    </footer>

    <script src="js/products.js"></script>
    <script src="js/cart.js"></script>
    <script>
		// ========== FUNGSI UTILITY ==========

		// Fungsi untuk mendapatkan total item
		function getTotalCartItems() {
			let total = 0;
			if (typeof cart !== 'undefined') {
				total += cart.getTotalItems();
			}
			const checkoutItem = JSON.parse(sessionStorage.getItem('checkoutItem'));
			if (checkoutItem && checkoutItem.quantity) {
				total += checkoutItem.quantity;
			}
			return total;
		}

		// Update icon cart
		function updateCartIconCount() {
			const total = getTotalCartItems();
			document.querySelectorAll('.cart-count').forEach(el => {
				el.textContent = total;
				el.style.display = total > 0 ? 'flex' : 'none';
			});
		}

		// ========== FUNGSI DISPLAY CART ==========

		function displayCart() {
			const container = document.getElementById('cartItems');
			const totalEl = document.getElementById('totalHarga');
			
			if (!container || !totalEl) return;
			
			const checkoutItem = JSON.parse(sessionStorage.getItem('checkoutItem'));
			
			if (checkoutItem) {
				// BELI LANGSUNG
				const item = checkoutItem;
				const tipeData = item.product.varian?.tipe?.find(t => t.kode === item.varian.tipe) || { nama: item.varian.tipe };
				const hargaSatuan = (item.product.harga?.diskon || item.product.harga?.normal || 0) + (tipeData?.hargaTambahan || 0);
				const total = hargaSatuan * item.quantity;
				
				container.innerHTML = `
					<div class="checkout-item">
						<img src="${item.product.gambar.utama}" alt="${item.product.nama}" onerror="this.src='assets/images/default-product.jpg'">
						<div class="item-details">
							<div class="item-name">${item.product.nama}</div>
							<div class="item-variant">
								<i class="fas fa-tag"></i> ${tipeData?.nama || item.varian.tipe}
							</div>
							<div class="item-controls" style="justify-content: space-between;">
								<span>Jumlah: <strong>${item.quantity}</strong></span>
								<span class="item-price">Rp ${(hargaSatuan * item.quantity).toLocaleString()}</span>
							</div>
						</div>
					</div>
				`;
				totalEl.textContent = `Rp ${total.toLocaleString()}`;
				
			} else {
				// DARI KERANJANG
				const items = cart.items;
				const total = cart.getSubtotal();
				
				if (items.length === 0) {
					container.innerHTML = `
						<div class="empty-cart">
							<i class="fas fa-shopping-cart"></i>
							<h3>Keranjang Belanja Kosong</h3>
							<p>Belum ada produk yang ditambahkan</p>
							<a href="products.html" class="btn-shop">
								<i class="fas fa-arrow-left"></i> Belanja Sekarang
							</a>
						</div>
					`;
				} else {
					container.innerHTML = items.map((item, index) => {
						const tipeNama = item.varian.tipeNama || (item.varian.tipe === 'PS' ? 'Punggung Standar' : 'Punggung Kecil');
						return `
							<div class="checkout-item">
								<img src="${item.gambar}" alt="${item.nama}" onerror="this.src='assets/images/default-product.jpg'">
								<div class="item-details">
									<div class="item-name">${item.nama}</div>
									<div class="item-variant">
										<i class="fas fa-tag"></i> ${tipeNama}
									</div>
									<div class="item-controls" style="justify-content: space-between;">
										<span>Jumlah: <strong>${item.quantity}</strong></span>
										<span class="item-price">Rp ${(item.harga * item.quantity).toLocaleString()}</span>
									</div>
								</div>
							</div>
						`;
					}).join('');
				}
				totalEl.textContent = `Rp ${total.toLocaleString()}`;
			}
			
			updateCartIconCount();
		}

		// ========== FUNGSI CHECKOUT VIA WHATSAPP ==========

		function checkoutWA() {
			try {
				console.log('Memproses checkout...');
				
				// Ambil data items
				const checkoutItem = JSON.parse(sessionStorage.getItem('checkoutItem'));
				let items = [];
				let total = 0;
				
				if (checkoutItem) {
					items = [checkoutItem];
					const tipeData = checkoutItem.product.varian?.tipe?.find(t => t.kode === checkoutItem.varian.tipe) || { nama: checkoutItem.varian.tipe };
					const harga = (checkoutItem.product.harga?.diskon || checkoutItem.product.harga?.normal || 0) + (tipeData?.hargaTambahan || 0);
					total = harga * checkoutItem.quantity;
				} else {
					if (!cart || !cart.items || cart.items.length === 0) {
						alert('Keranjang belanja masih kosong!');
						return;
					}
					items = cart.items;
					total = cart.getSubtotal();
				}
				
				// Format pesan WhatsApp
				let message = `*┏━━━━━━━━━━━━━━━━━━━┓*\n`;
				message += `*┃    PESANAN BARU    ┃*\n`;
				message += `*┗━━━━━━━━━━━━━━━━━━━┛*\n\n`;
				
				message += `*🛒 DETAIL PESANAN*\n`;
				message += `──────────────────\n`;
				
				items.forEach((item, index) => {
					const tipeNama = item.varian?.tipeNama || 
									item.varian?.tipe || 
									(item.product?.varian?.tipe?.find(t => t.kode === item.varian?.tipe)?.nama || 'Standar');
					
					const namaProduk = item.nama || item.product?.nama || 'Produk';
					const jumlah = item.quantity || 1;
					const hargaSatuan = item.harga || (item.product?.harga?.diskon || item.product?.harga?.normal || 0);
					const subtotal = hargaSatuan * jumlah;
					
					message += `\n*${index + 1}. ${namaProduk}*\n`;
					message += `   Tipe: ${tipeNama}\n`;
					message += `   Jumlah: ${jumlah} x Rp ${hargaSatuan.toLocaleString()}\n`;
					message += `   Subtotal: Rp ${subtotal.toLocaleString()}\n`;
				});
				
				message += `\n*💰 TOTAL PEMBAYARAN*\n`;
				message += `──────────────────\n`;
				message += `*Rp ${total.toLocaleString()}*\n\n`;
				
				message += `*📝 UNTUK MELENGKAPI PESANAN:*\n`;
				message += `Silakan kirimkan data berikut:\n`;
				message += `1. Nama lengkap\n`;
				message += `2. Nomor WhatsApp aktif\n`;
				message += `3. Alamat lengkap\n`;
				message += `4. Catatan (jika ada)\n\n`;
				
				message += `*📅 WAKTU PESAN*\n`;
				message += `${new Date().toLocaleString('id-ID', { 
					weekday: 'long', 
					year: 'numeric', 
					month: 'long', 
					day: 'numeric',
					hour: '2-digit',
					minute: '2-digit'
				})}\n\n`;
				
				message += `*━━━━━━━━━━━━━━━━━━━*\n`;
				message += `_Terima kasih telah berbelanja di Inti Media Printing_`;
				
				// Nomor toko
				const noToko = "6282211306022";
				
				// Buat URL WhatsApp
				const waUrl = `https://wa.me/${noToko}?text=${encodeURIComponent(message)}`;
				
				// Buka WhatsApp
				if (/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
					// Mobile - coba buka app dulu
					window.location.href = `whatsapp://send?phone=${noToko}&text=${encodeURIComponent(message)}`;
					setTimeout(() => {
						window.location.href = waUrl;
					}, 500);
				} else {
					// Desktop
					window.open(waUrl, '_blank');
				}
				
				// Kosongkan keranjang
				setTimeout(() => {
					if (!checkoutItem) {
						if (cart && cart.clear) {
							cart.clear();
						}
					} else {
						sessionStorage.removeItem('checkoutItem');
					}
					// Redirect ke produk setelah 2 detik
					setTimeout(() => {
						window.location.href = 'products.html';
					}, 2000);
				}, 1000);
				
			} catch (error) {
				console.error('Error:', error);
				alert('Gagal membuka WhatsApp. Silakan coba lagi.');
			}
		}

		// ========== FUNGSI SEARCH ==========

		function searchProducts() {
			const searchInput = document.getElementById('searchInputHome');
			const query = searchInput ? searchInput.value.trim() : '';
			if (query) {
				window.location.href = `products.html?search=${encodeURIComponent(query)}`;
			} else {
				window.location.href = 'products.html';
			}
		}

		// ========== INITIALIZE ==========

		document.addEventListener('DOMContentLoaded', function() {
			displayCart();
			
			// Cart icon click
			const cartIcon = document.getElementById('cartIcon');
			if (cartIcon) {
				cartIcon.addEventListener('click', function() {
					window.location.href = 'checkout.html';
				});
			}
			
			// Tombol WhatsApp
			const waBtn = document.getElementById('whatsappCheckoutBtn');
			if (waBtn) {
				waBtn.addEventListener('click', function(e) {
					e.preventDefault();
					e.stopPropagation();
					checkoutWA();
				});
				
				// Untuk touch di mobile
				waBtn.addEventListener('touchstart', function(e) {
					e.preventDefault();
					e.stopPropagation();
					checkoutWA();
				}, { passive: false });
			}
			
			// Search enter key
			const searchInput = document.getElementById('searchInputHome');
			if (searchInput) {
				searchInput.addEventListener('keypress', function(e) {
					if (e.key === 'Enter') {
						searchProducts();
					}
				});
			}
		});

        // Add animation styles
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from {
                    transform: translateX(100%);
                    opacity: 0;
                }
                to {
                    transform: translateX(0);
                    opacity: 1;
                }
            }
            
            @keyframes slideOut {
                from {
                    transform: translateX(0);
                    opacity: 1;
                }
                to {
                    transform: translateX(100%);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);
    </script>

	<script>
		// Mobile Menu Toggle
		document.addEventListener('DOMContentLoaded', function() {
			const mobileToggle = document.getElementById('mobileMenuToggle');
			const navMenu = document.getElementById('navMenu');
			
			if (mobileToggle && navMenu) {
				mobileToggle.addEventListener('click', function() {
					navMenu.classList.toggle('active');
					
					// Animate hamburger to X
					const spans = this.children;
					if (navMenu.classList.contains('active')) {
						spans[0].style.transform = 'rotate(45deg) translate(5px, 5px)';
						spans[1].style.opacity = '0';
						spans[2].style.transform = 'rotate(-45deg) translate(7px, -7px)';
					} else {
						spans[0].style.transform = 'none';
						spans[1].style.opacity = '1';
						spans[2].style.transform = 'none';
					}
				});
				
				// Close menu when clicking outside
				document.addEventListener('click', function(event) {
					if (!navMenu.contains(event.target) && !mobileToggle.contains(event.target)) {
						navMenu.classList.remove('active');
						const spans = mobileToggle.children;
						spans[0].style.transform = 'none';
						spans[1].style.opacity = '1';
						spans[2].style.transform = 'none';
					}
				});
				
				// Close menu when clicking a link
				navMenu.querySelectorAll('a').forEach(link => {
					link.addEventListener('click', function() {
						navMenu.classList.remove('active');
						const spans = mobileToggle.children;
						spans[0].style.transform = 'none';
						spans[1].style.opacity = '1';
						spans[2].style.transform = 'none';
					});
				});
			}
			
			// Fix untuk input di mobile
			const searchInput = document.getElementById('searchInputHome');
			if (searchInput) {
				searchInput.addEventListener('focus', function() {
					// Scroll ke posisi yang tepat agar keyboard tidak menutupi input
					setTimeout(() => {
						this.scrollIntoView({ behavior: 'smooth', block: 'center' });
					}, 300);
				});
			}
			
			// Fix untuk touch events
			const buttons = document.querySelectorAll('button, .product-card, .feature-card');
			buttons.forEach(button => {
				button.addEventListener('touchstart', function(e) {
					// Prevent double tap zoom on buttons
					e.preventDefault();
				}, { passive: false });
			});
			
			// Fix untuk 100vh di mobile (mengatasi masalah address bar)
			const setVh = () => {
				const vh = window.innerHeight * 0.01;
				document.documentElement.style.setProperty('--vh', `${vh}px`);
			};
			
			setVh();
			window.addEventListener('resize', setVh);
		});
	</script>
</body>
