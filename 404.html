<!DOCTYPE html>
<html lang="id">
<head>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="container-header">
            <div class="nav-brand">
                <a href="index.html">
                    <img src="assets/images/logo.png" alt="IMPrintingOnline Logo" class="nav-logo">
                    PrintingOnline
                </a>
            </div>
            <div class="search-section">
                <div class="search-container">
                    <input type="text" class="search-input" id="searchInputHome" placeholder="Cari produk.....">
                    <button class="search-btn" onclick="searchProducts()">🔍</button>
                </div>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="about.html">About Us</a></li>
            </ul>
            <div class="cart-icon" id="cartIcon" style="cursor: pointer;">
                <i class="fa-solid fa-cart-shopping"></i>
                <span class="cart-count">0</span>
            </div>
        </div>
    </nav>

    <div class="container" style="text-align: center; padding: 100px 20px;">
        <h1 style="font-size: 72px; color: var(--primary); margin-bottom: 20px;">404</h1>
        <h2 style="margin-bottom: 20px;">Halaman Tidak Ditemukan</h2>
        <p style="margin-bottom: 30px; color: var(--text-light); max-width: 500px; margin-left: auto; margin-right: auto;">
            Maaf, halaman yang Anda cari tidak ada atau telah dipindahkan.
        </p>
        <a href="index.html" style="background: var(--primary); color: white; padding: 12px 30px; text-decoration: none; border-radius: 4px; display: inline-block;">Kembali ke Beranda</a>

    <footer>
        <p>© 2026 Inti Media Printing - All Rights Reserved</p>
    </footer>

    <script src="js/products.js"></script>
    <script src="js/cart.js"></script>
    <script>
        function searchProducts() {
            const query = document.getElementById('searchInputHome').value;
            if (query.trim()) {
                window.location.href = `products.html?search=${encodeURIComponent(query)}`;
            }
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            const cartIcon = document.getElementById('cartIcon');
            if (cartIcon) {
                cartIcon.addEventListener('click', function() {
                    window.location.href = 'checkout.html';
                });
            }
        });
    </script>
